name: StratisIO CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        cd v2-enterprise/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backend Tests
      run: |
        cd v2-enterprise/backend
        # placeholder for real tests
        echo "Running tests..."
        
    - name: Build Docker Image
      run: |
        docker build -t stratisio-backend:latest ./v2-enterprise/backend
